<!DOCTYPE html>
<html>
<head>
<title>Chintu Cartoon Story</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(skyblue, lightgreen);
  text-align: center;
}

h1 {
  background: orange;
  padding: 10px;
}

#scene {
  margin-top: 50px;
}

#character {
  width: 120px;
  position: relative;
  animation: move 4s infinite;
}

@keyframes move {
  0% { left: -100px; }
  50% { left: 100px; }
  100% { left: -100px; }
}

#text {
  font-size: 22px;
  margin-top: 20px;
  background: white;
  display: inline-block;
  padding: 10px;
  border-radius: 10px;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 18px;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>Chintu aur Jadui Pencil ✏️</h1>

<div id="scene">
  <img id="character" src="https://i.imgur.com/4AiXzf8.png">
</div>

<div id="text">Start button dabao aur story dekho 😊</div>

<br>
<button onclick="nextScene()">Next ▶</button>

<script>
let story = [
"Ek chhota sa gaon tha jahan Chintu rehta tha.",
"Chintu ko drawing banana bahut pasand tha.",
"Ek din usse ek chamakdaar jadui pencil mili!",
"Usne aam banaya... aur aam sach me aa gaya 😲",
"Phir usne chocolate aur toys banaye 🍫🚗",
"Lekin jab usne paise banaye... wo gaayab ho gaye!",
"Pencil boli: lalach mat karo!",
"Chintu ko apni galti samajh aa gayi.",
"Usne garib bachcho ke liye khana aur kitaabe banayi ❤️",
"Aur wo ek accha ladka ban gaya 😊",
"Moral: Hamesha achha kaam karo, lalach nahi!"
];

let i = 0;

function nextScene() {
  document.getElementById("text").innerText = story[i];
  i++;

  if(i >= story.length) {
    i = 0;
  }
}
</script>

</body>
</html>
